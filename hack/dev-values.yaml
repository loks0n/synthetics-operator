# Helm value overrides for local development.
# Applied by Tiltfile on top of charts/synthetics-operator/values.yaml.
controller:
  image:
    repository: ko.local/synthetics-operator-controller
    tag: latest
    pullPolicy: Never

webhook:
  image:
    repository: ko.local/synthetics-operator-webhook
    tag: latest
    pullPolicy: Never
  replicaCount: 1
  # No priority class needed in the local dev cluster.
  priorityClassName: ""

prober:
  image:
    repository: ko.local/synthetics-operator-prober
    tag: latest
    pullPolicy: Never

metrics:
  image:
    repository: ko.local/synthetics-operator-metrics
    tag: latest
    pullPolicy: Never

# In-chart NATS so Playwright/K6 CronJob sidecars and the operator's own
# consumer have a bus to talk over without needing an external one.
nats:
  enabled: true

# Runner images for CronJob-backed tests. Tagged :dev (not :latest) so
# kubelet uses pullPolicy: IfNotPresent and doesn't try to pull from the
# fake ko.local registry.
testSidecar:
  image: ko.local/synthetics-test-sidecar:dev
k6Runner:
  image: ko.local/synthetics-k6-runner:dev
playwrightRunner:
  image: ko.local/synthetics-playwright-runner:dev
