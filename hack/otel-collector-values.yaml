# opentelemetry-collector values for local dev.
# Runs as a Deployment (mode: deployment) receiving OTLP and exposing a
# Prometheus scrape endpoint for anything that sends metrics via OTLP.

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 50m
    memory: 64Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_mib: 50

  exporters:
    # Expose a /metrics endpoint that Prometheus can scrape.
    prometheus:
      endpoint: 0.0.0.0:8889
      namespace: otelcol

  service:
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]

# Expose the Prometheus scrape port.
ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
