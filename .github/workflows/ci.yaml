name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4

      - name: Run go vet
        run: go vet ./...

  fmt:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go fmt
        run: go fmt ./...

      - name: Verify formatting is clean
        run: git diff --exit-code

  unit-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: make test

  envtest:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install managed tools
        run: make tools

      - name: Run envtest suite
        run: make test-envtest

  helm:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5.0.0

      - name: Run Helm validation
        run: make helm-lint helm-template

  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - lint
      - fmt
      - unit-test
      - envtest
      - helm
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: ko-build/setup-ko@v0.7
        with:
          version: v0.18.1

      - name: Build controller image
        id: build-controller
        run: |
          IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-controller ko build --local --bare ./cmd/controller)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          docker save "$IMAGE" -o /tmp/controller-image.tar

      - name: Build webhook image
        id: build-webhook
        run: |
          IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-webhook ko build --local --bare ./cmd/webhook)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          docker save "$IMAGE" -o /tmp/webhook-image.tar

      - name: Build prober image
        id: build-prober
        run: |
          IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-prober ko build --local --bare ./cmd/prober)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          docker save "$IMAGE" -o /tmp/prober-image.tar

      - name: Build metrics image
        id: build-metrics
        run: |
          IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-metrics ko build --local --bare ./cmd/metrics)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          docker save "$IMAGE" -o /tmp/metrics-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v7
        with:
          name: operator-images
          path: |
            /tmp/controller-image.tar
            /tmp/webhook-image.tar
            /tmp/prober-image.tar
            /tmp/metrics-image.tar
          retention-days: 1

  kind-smoke:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5.0.0

      - uses: ko-build/setup-ko@v0.7
        with:
          version: v0.18.1

      - name: Download image artifacts
        uses: actions/download-artifact@v7
        with:
          name: operator-images
          path: /tmp

      - name: Load operator images into Docker
        run: |
          CONTROLLER_IMAGE=$(docker load -i /tmp/controller-image.tar | awk '{print $NF}')
          WEBHOOK_IMAGE=$(docker load -i /tmp/webhook-image.tar | awk '{print $NF}')
          PROBER_IMAGE=$(docker load -i /tmp/prober-image.tar | awk '{print $NF}')
          METRICS_IMAGE=$(docker load -i /tmp/metrics-image.tar | awk '{print $NF}')
          {
            echo "CONTROLLER_IMAGE=$CONTROLLER_IMAGE"
            echo "WEBHOOK_IMAGE=$WEBHOOK_IMAGE"
            echo "PROBER_IMAGE=$PROBER_IMAGE"
            echo "METRICS_IMAGE=$METRICS_IMAGE"
          } >> "$GITHUB_ENV"

      - name: Build test-sidecar image
        run: |
          SIDECAR_IMAGE=$(KO_DOCKER_REPO=ko.local ko build --local --bare ./images/test-sidecar)
          echo "SIDECAR_IMAGE=$SIDECAR_IMAGE" >> "$GITHUB_ENV"

      - name: Build playwright-runner image
        run: |
          # Tag by a short image-id digest so the CronJob's pod spec references
          # an immutable tag. Kubelet's default pullPolicy for `:latest` is
          # Always, which would try to pull from the fake ko.local registry.
          docker build -t ko.local/synthetics-playwright-runner:latest ./images/playwright-runner
          PW_TAG=$(docker image inspect ko.local/synthetics-playwright-runner:latest --format '{{.Id}}' | sed 's/sha256://' | cut -c1-12)
          docker tag ko.local/synthetics-playwright-runner:latest ko.local/synthetics-playwright-runner:$PW_TAG
          echo "PLAYWRIGHT_IMAGE=ko.local/synthetics-playwright-runner:$PW_TAG" >> "$GITHUB_ENV"

      - uses: helm/kind-action@v1.13.0
        with:
          cluster_name: synthetics
          node_image: kindest/node:v1.33.0

      - name: Load images into kind
        run: |
          kind load docker-image "$CONTROLLER_IMAGE" --name synthetics
          kind load docker-image "$WEBHOOK_IMAGE" --name synthetics
          kind load docker-image "$PROBER_IMAGE" --name synthetics
          kind load docker-image "$METRICS_IMAGE" --name synthetics
          kind load docker-image "$SIDECAR_IMAGE" --name synthetics
          kind load docker-image "$PLAYWRIGHT_IMAGE" --name synthetics

      - name: Install chart
        run: |
          kubectl create namespace synthetics-system
          helm upgrade --install synthetics-operator charts/synthetics-operator \
            --namespace synthetics-system \
            --set-string controller.image.ref="$CONTROLLER_IMAGE" \
            --set controller.image.pullPolicy=IfNotPresent \
            --set-string webhook.image.ref="$WEBHOOK_IMAGE" \
            --set webhook.image.pullPolicy=IfNotPresent \
            --set-string prober.image.ref="$PROBER_IMAGE" \
            --set prober.image.pullPolicy=IfNotPresent \
            --set-string metrics.image.ref="$METRICS_IMAGE" \
            --set metrics.image.pullPolicy=IfNotPresent \
            --set nats.enabled=true \
            --set-string testSidecar.image="$SIDECAR_IMAGE" \
            --set-string playwrightRunner.image="$PLAYWRIGHT_IMAGE"

      - name: Wait for operator rollout
        run: |
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-controller --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-webhook --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-nats --timeout=120s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-prober --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-metrics --timeout=180s

      - name: Deploy echo service
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: echo
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: echo
            template:
              metadata:
                labels:
                  app: echo
              spec:
                containers:
                  - name: echo
                    image: hashicorp/http-echo:1.0.0
                    args:
                      - -text=ok
                      - -listen=:5678
                    ports:
                      - containerPort: 5678
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: echo
          spec:
            selector:
              app: echo
            ports:
              - port: 80
                targetPort: 5678
          EOF
          kubectl rollout status deployment/echo --timeout=120s

      - name: Apply HTTPProbe
        run: kubectl apply -f examples/httpprobe-basic.yaml

      - name: Apply PlaywrightTest
        run: |
          # Smoke-specific PlaywrightTest script pointed at the in-cluster echo
          # service so CI doesn't depend on public internet reachability.
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: smoke-playwright-script
          data:
            test.spec.js: |
              const { test, expect } = require('@playwright/test');
              test('echo returns ok', async ({ page }) => {
                const response = await page.goto('http://echo');
                expect(response.status()).toBe(200);
                await expect(page.locator('body')).toContainText('ok');
              });
          ---
          apiVersion: synthetics.dev/v1alpha1
          kind: PlaywrightTest
          metadata:
            name: smoke-echo
          spec:
            interval: 1m
            script:
              configMap:
                name: smoke-playwright-script
                key: test.spec.js
            ttlAfterFinished: 5m
          EOF

      - name: Verify HTTPProbe metrics
        run: |
          kubectl -n synthetics-system port-forward svc/synthetics-operator-metrics 8080:8080 >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          # Poll for up to 120s to allow at least one probe interval (30s) plus startup.
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/metrics 2>/dev/null | grep -qE 'synthetics_probe\{[^}]*name="echo-healthcheck"[^}]*\} 1'; then
              exit 0
            fi
            sleep 3
          done
          cat /tmp/port-forward.log || true
          curl -fsS http://127.0.0.1:8080/metrics || true
          exit 1

      - name: Verify PlaywrightTest metrics
        run: |
          kubectl -n synthetics-system port-forward svc/synthetics-operator-metrics 8080:8080 >/tmp/pf-pw.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          # CronJob resolution is 1m; add Playwright startup + Chromium launch
          # (~15-30s) + NATS publish. Budget ~4 minutes before declaring failure.
          for i in $(seq 1 80); do
            if curl -fsS http://127.0.0.1:8080/metrics 2>/dev/null | grep -qE 'synthetics_test_playwright_cases_passed\{[^}]*name="smoke-echo"[^}]*\} 1'; then
              exit 0
            fi
            sleep 3
          done
          echo "--- port-forward log ---"
          cat /tmp/pf-pw.log || true
          echo "--- operator logs ---"
          kubectl -n synthetics-system logs deployment/synthetics-operator-controller --tail=100 || true
          echo "--- playwright cronjob status ---"
          kubectl describe cronjob smoke-echo || true
          echo "--- most recent playwright pod ---"
          POD=$(kubectl get pods -l job-name --field-selector=status.phase!=Pending -o name | head -1)
          [ -n "$POD" ] && kubectl describe "$POD" || true
          [ -n "$POD" ] && kubectl logs "$POD" --all-containers --prefix || true
          echo "--- /metrics snapshot ---"
          curl -fsS http://127.0.0.1:8080/metrics || true
          exit 1

  nightly-kind:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_image:
          - kindest/node:v1.33.0
          - kindest/node:v1.34.0
          - kindest/node:v1.35.0
          - kindest/node:v1.36.0
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5.0.0

      - uses: ko-build/setup-ko@v0.7
        with:
          version: v0.18.1

      - name: Build images with ko
        run: |
          CONTROLLER_IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-controller ko build --local --bare ./cmd/controller)
          WEBHOOK_IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-webhook ko build --local --bare ./cmd/webhook)
          PROBER_IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-prober ko build --local --bare ./cmd/prober)
          METRICS_IMAGE=$(KO_DOCKER_REPO=ko.local/synthetics-operator-metrics ko build --local --bare ./cmd/metrics)
          {
            echo "CONTROLLER_IMAGE=$CONTROLLER_IMAGE"
            echo "WEBHOOK_IMAGE=$WEBHOOK_IMAGE"
            echo "PROBER_IMAGE=$PROBER_IMAGE"
            echo "METRICS_IMAGE=$METRICS_IMAGE"
          } >> "$GITHUB_ENV"

      - uses: helm/kind-action@v1.13.0
        with:
          cluster_name: synthetics
          node_image: ${{ matrix.node_image }}

      - name: Load images into kind
        run: |
          kind load docker-image "$CONTROLLER_IMAGE" --name synthetics
          kind load docker-image "$WEBHOOK_IMAGE" --name synthetics
          kind load docker-image "$PROBER_IMAGE" --name synthetics
          kind load docker-image "$METRICS_IMAGE" --name synthetics

      - name: Install chart
        run: |
          kubectl create namespace synthetics-system
          helm upgrade --install synthetics-operator charts/synthetics-operator \
            --namespace synthetics-system \
            --set-string controller.image.ref="$CONTROLLER_IMAGE" \
            --set controller.image.pullPolicy=IfNotPresent \
            --set-string webhook.image.ref="$WEBHOOK_IMAGE" \
            --set webhook.image.pullPolicy=IfNotPresent \
            --set-string prober.image.ref="$PROBER_IMAGE" \
            --set prober.image.pullPolicy=IfNotPresent \
            --set-string metrics.image.ref="$METRICS_IMAGE" \
            --set metrics.image.pullPolicy=IfNotPresent \
            --set nats.enabled=true

      - name: Wait for operator rollout
        run: |
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-controller --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-webhook --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-prober --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-metrics --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-nats --timeout=120s
