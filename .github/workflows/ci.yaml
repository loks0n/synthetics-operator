name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4

      - name: Run go vet
        run: go vet ./...

  fmt:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go fmt
        run: go fmt ./...

      - name: Verify formatting is clean
        run: git diff --exit-code

  unit-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: make test

  envtest:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install managed tools
        run: make tools

      - name: Run envtest suite
        run: make test-envtest

  helm:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5.0.0

      - name: Run Helm validation
        run: make helm-lint helm-template

  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - lint
      - fmt
      - unit-test
      - envtest
      - helm
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: ko-build/setup-ko@v0.7
        with:
          version: v0.18.1

      - name: Build image with ko
        id: build-image
        run: |
          IMAGE=$(KO_DOCKER_REPO=ko.local ko build --local --bare .)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          docker save "$IMAGE" -o /tmp/operator-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: operator-image
          path: /tmp/operator-image.tar
          retention-days: 1

  kind-smoke:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5.0.0

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: operator-image
          path: /tmp

      - name: Load image into Docker
        run: |
          IMAGE=$(docker load -i /tmp/operator-image.tar | awk '{print $NF}')
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: helm/kind-action@v1.13.0
        with:
          cluster_name: synthetics
          node_image: kindest/node:v1.33.0

      - name: Load image into kind
        run: kind load docker-image "$IMAGE" --name synthetics

      - name: Install chart
        run: |
          kubectl create namespace synthetics-system
          helm upgrade --install synthetics-operator charts/synthetics-operator \
            --namespace synthetics-system \
            --set-string image.ref="$IMAGE" \
            --set image.pullPolicy=IfNotPresent

      - name: Wait for operator rollout
        run: |
          kubectl -n synthetics-system rollout status deployment/synthetics-operator --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-webhook --timeout=180s

      - name: Deploy echo service
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: echo
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: echo
            template:
              metadata:
                labels:
                  app: echo
              spec:
                containers:
                  - name: echo
                    image: hashicorp/http-echo:1.0.0
                    args:
                      - -text=ok
                      - -listen=:5678
                    ports:
                      - containerPort: 5678
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: echo
          spec:
            selector:
              app: echo
            ports:
              - port: 80
                targetPort: 5678
          EOF
          kubectl rollout status deployment/echo --timeout=120s

      - name: Apply probe
        run: kubectl apply -f examples/phase1-httpprobe.yaml

      - name: Verify metrics
        run: |
          kubectl -n synthetics-system port-forward svc/synthetics-operator-metrics 8080:8080 >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT
          # Poll for up to 120s to allow at least one probe interval (30s) plus startup.
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/metrics 2>/dev/null | grep -q 'synthetics_probe_up{name="phase1-echo",namespace="default",kind="HTTPProbe"} 1'; then
              exit 0
            fi
            sleep 3
          done
          cat /tmp/port-forward.log || true
          curl -fsS http://127.0.0.1:8080/metrics || true
          exit 1

  nightly-kind:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_image:
          - kindest/node:v1.33.0
          - kindest/node:v1.34.0
    steps:
      - uses: actions/checkout@v6.0.1

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v5.0.0

      - uses: ko-build/setup-ko@v0.7
        with:
          version: v0.18.1

      - name: Build image with ko
        run: |
          IMAGE=$(KO_DOCKER_REPO=ko.local ko build --local --bare .)
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: helm/kind-action@v1.13.0
        with:
          cluster_name: synthetics
          node_image: ${{ matrix.node_image }}

      - name: Load image into kind
        run: kind load docker-image "$IMAGE" --name synthetics

      - name: Install chart
        run: |
          kubectl create namespace synthetics-system
          helm upgrade --install synthetics-operator charts/synthetics-operator \
            --namespace synthetics-system \
            --set-string image.ref="$IMAGE" \
            --set image.pullPolicy=IfNotPresent

      - name: Wait for operator rollout
        run: |
          kubectl -n synthetics-system rollout status deployment/synthetics-operator --timeout=180s
          kubectl -n synthetics-system rollout status deployment/synthetics-operator-webhook --timeout=180s
