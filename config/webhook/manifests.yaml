apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: synthetics-operator-mutating-webhook-configuration
webhooks:
  - name: mhttpprobe.kb.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: default
        name: synthetics-operator-webhook-service
        path: /mutate-synthetics-dev-v1alpha1-httpprobe
      caBundle: ""
    rules:
      - apiGroups: ["synthetics.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["httpprobes"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: synthetics-operator-validating-webhook-configuration
webhooks:
  - name: vhttpprobe.kb.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: default
        name: synthetics-operator-webhook-service
        path: /validate-synthetics-dev-v1alpha1-httpprobe
      caBundle: ""
    rules:
      - apiGroups: ["synthetics.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["httpprobes"]
