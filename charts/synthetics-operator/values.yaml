image:
  ref: ""
  repository: ghcr.io/loks0n/synthetics-operator
  tag: latest
  pullPolicy: IfNotPresent

# Controller Deployment.
#
# Runs reconcilers + the NATS scheduler + the event notifier. Publishes
# spec updates and probe jobs onto NATS; does not execute probes or serve
# /metrics — those live in the probe-worker and metrics Deployments.
#
# Active-passive: multi-replica requires leaderElection: true so only one
# leader reconciles and dispatches jobs at a time.
replicaCount: 1
leaderElection: false

serviceAccount:
  create: true
  name: ""

resources: {}

# probe-worker Deployment.
#
# Stateless. Subscribes to NATS (synthetics.specs + synthetics.probes.jobs
# via a queue group) and executes HTTPProbe / DNSProbe runs. Horizontally
# scalable — NATS queue groups load-balance jobs across replicas.
probeWorker:
  replicaCount: 1
  resources: {}

# metrics Deployment.
#
# Stateless Prometheus endpoint. Subscribes to NATS spec updates + probe
# results + test results, maintains an in-memory metrics store, serves
# /metrics. Scale replicas for scrape availability — each replica holds
# identical state from the NATS stream.
metrics:
  replicaCount: 1
  resources: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

webhookDeployment:
  replicaCount: 2
  # Elevated priority keeps the webhook available under node pressure.
  # If evicted, kubectl apply fails for all CRD types cluster-wide.
  priorityClassName: system-cluster-critical
  resources: {}

webhook:
  serviceName: synthetics-operator-webhook-service
  secretName: synthetics-webhook-certs
  validatingWebhookConfigurationName: synthetics-operator-validating-webhook-configuration
  mutatingWebhookConfigurationName: synthetics-operator-mutating-webhook-configuration

# NATS is the result-transport bus for CronJob-backed tests (K6Test,
# PlaywrightTest). Probes don't use it.
#
# Two supported postures:
#
#   1. Chart-bundled NATS (nats.enabled: true, externalUrl empty) — single
#      replica, no JetStream, fine for dev and small production setups.
#      Messages in flight during a NATS restart are lost.
#
#   2. External NATS (nats.enabled: false, externalUrl set) — point at a
#      NATS cluster you manage separately. The official nats-io/k8s Helm
#      chart supports proper HA with clustering and JetStream. Recommended
#      for production.
nats:
  enabled: false
  image: nats:2.10-alpine
  replicas: 1
  resources: {}
  # URL the operator and test-sidecar should use. If set, the in-chart NATS
  # Deployment is skipped regardless of `enabled`. Must be reachable from
  # probe/test namespaces.
  # Example: nats://nats.nats-system.svc.cluster.local:4222
  externalUrl: ""

testSidecar:
  image: ""

k6Runner:
  image: ""

playwrightRunner:
  image: ""
