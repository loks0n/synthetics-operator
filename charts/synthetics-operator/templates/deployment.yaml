apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synthetics-operator.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "synthetics-operator.serviceAccountName" . }}
      containers:
        - name: manager
          image: {{ include "synthetics-operator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --role=controller
            - --webhook-namespace=$(POD_NAMESPACE)
            - --webhook-service-name={{ include "synthetics-operator.webhookServiceName" . }}
            - --webhook-secret-name={{ .Values.webhook.secretName }}
            - --validating-webhook-configuration={{ .Values.webhook.validatingWebhookConfigurationName }}
            - --mutating-webhook-configuration={{ .Values.webhook.mutatingWebhookConfigurationName }}
            {{- if .Values.leaderElection }}
            - --leader-elect=true
            {{- end }}
            - --nats-url={{ include "synthetics-operator.natsURL" . }}
            {{- if .Values.testSidecar.image }}
            - --test-sidecar-image={{ .Values.testSidecar.image }}
            {{- end }}
            {{- if .Values.k6Runner.image }}
            - --k6-runner-image={{ .Values.k6Runner.image }}
            {{- end }}
            {{- if .Values.playwrightRunner.image }}
            - --playwright-runner-image={{ .Values.playwrightRunner.image }}
            {{- end }}
          ports:
            - name: healthz
              containerPort: 8081
          resources:
{{ toYaml .Values.resources | indent 12 }}
