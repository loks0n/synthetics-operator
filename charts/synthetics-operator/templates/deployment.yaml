apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synthetics-operator.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
    spec:
      serviceAccountName: {{ include "synthetics-operator.serviceAccountName" . }}
      containers:
        - name: manager
          image: {{ include "synthetics-operator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --metrics-bind-address=:8080
            - --webhook-port=9443
            - --webhook-namespace=$(POD_NAMESPACE)
            - --webhook-service-name={{ include "synthetics-operator.webhookServiceName" . }}
            - --webhook-secret-name={{ .Values.webhook.secretName }}
            - --validating-webhook-configuration={{ .Values.webhook.validatingWebhookConfigurationName }}
            - --mutating-webhook-configuration={{ .Values.webhook.mutatingWebhookConfigurationName }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: healthz
              containerPort: 8081
            - name: webhook
              containerPort: 9443
          resources:
{{ toYaml .Values.resources | indent 12 }}
