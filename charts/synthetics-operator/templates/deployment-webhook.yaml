apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synthetics-operator.fullname" . }}-webhook
spec:
  replicas: {{ .Values.webhookDeployment.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
        app.kubernetes.io/component: webhook
    spec:
      serviceAccountName: {{ include "synthetics-operator.webhookServiceAccountName" . }}
      {{- with .Values.webhookDeployment.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: webhook
          image: {{ include "synthetics-operator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --role=webhook
            - --webhook-port=9443
            - --webhook-namespace=$(POD_NAMESPACE)
            - --webhook-secret-name={{ .Values.webhook.secretName }}
            - --webhook-service-name={{ include "synthetics-operator.webhookServiceName" . }}
            - --validating-webhook-configuration={{ .Values.webhook.validatingWebhookConfigurationName }}
            - --mutating-webhook-configuration={{ .Values.webhook.mutatingWebhookConfigurationName }}
          ports:
            - name: webhook
              containerPort: 9443
            - name: healthz
              containerPort: 8081
          resources:
{{ toYaml .Values.webhookDeployment.resources | indent 12 }}
