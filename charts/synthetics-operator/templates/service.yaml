apiVersion: v1
kind: Service
metadata:
  name: {{ include "synthetics-operator.webhookServiceName" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
    - name: webhook
      port: 443
      targetPort: webhook
