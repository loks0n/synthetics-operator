apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synthetics-operator.fullname" . }}-controller
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "synthetics-operator.name" . }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "synthetics-operator.serviceAccountName" . }}
      containers:
        - name: controller
          image: {{ include "synthetics-operator.componentImage" (dict "ctx" . "image" .Values.controller.image) | quote }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --webhook-namespace=$(POD_NAMESPACE)
            - --webhook-service-name={{ include "synthetics-operator.webhookServiceName" . }}
            - --webhook-secret-name={{ .Values.webhook.secretName }}
            - --validating-webhook-configuration={{ .Values.webhook.validatingWebhookConfigurationName }}
            - --mutating-webhook-configuration={{ .Values.webhook.mutatingWebhookConfigurationName }}
            {{- if .Values.controller.leaderElection }}
            - --leader-elect=true
            {{- end }}
            - --nats-url={{ include "synthetics-operator.natsURL" . }}
            - --test-sidecar-image={{ include "synthetics-operator.runnerImage" (dict "ctx" . "override" .Values.testSidecar.image "defaultRepo" "ghcr.io/loks0n/synthetics-test-sidecar") }}
            - --k6-runner-image={{ include "synthetics-operator.runnerImage" (dict "ctx" . "override" .Values.k6Runner.image "defaultRepo" "ghcr.io/loks0n/synthetics-k6-runner") }}
            - --playwright-runner-image={{ include "synthetics-operator.runnerImage" (dict "ctx" . "override" .Values.playwrightRunner.image "defaultRepo" "ghcr.io/loks0n/synthetics-playwright-runner") }}
          ports:
            - name: healthz
              containerPort: 8081
            - name: metrics
              containerPort: 8082
          resources:
{{ toYaml .Values.controller.resources | indent 12 }}
