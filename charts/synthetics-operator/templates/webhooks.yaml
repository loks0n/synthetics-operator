apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ .Values.webhook.mutatingWebhookConfigurationName }}
webhooks:
  - name: mhttpprobe.kb.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "synthetics-operator.webhookServiceName" . }}
        path: /mutate-synthetics-dev-v1alpha1-httpprobe
      caBundle: ""
    rules:
      - apiGroups: ["synthetics.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["httpprobes"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ .Values.webhook.validatingWebhookConfigurationName }}
webhooks:
  - name: vhttpprobe.kb.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "synthetics-operator.webhookServiceName" . }}
        path: /validate-synthetics-dev-v1alpha1-httpprobe
      caBundle: ""
    rules:
      - apiGroups: ["synthetics.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["httpprobes"]
