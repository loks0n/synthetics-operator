version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errname
    - exhaustive
    - gomodguard
    - modernize
    - predeclared
    - revive
  settings:
    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true
    gomodguard:
      blocked:
        modules:
          - github.com/pkg/errors:
              reason: Use stdlib errors.Join and fmt.Errorf with %w.
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: var-declaration
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
