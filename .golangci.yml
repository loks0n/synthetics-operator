version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - depguard
    - dupl
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forbidigo
    - gochecknoglobals
    - gocheckcompilerdirectives
    - gomodguard
    - gomoddirectives
    - goprintffuncname
    - iface
    - interfacebloat
    - intrange
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - predeclared
    - promlinter
    - reassign
    - recvcheck
    - revive
    - staticcheck
    - tagliatelle
    - thelper
    - unconvert
    - unparam
    - usetesting
    - usestdlibvars
    - wastedassign
  settings:
    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true
    loggercheck:
      logr: true
    tagliatelle:
      case:
        rules:
          json: camel
    ireturn:
      allow:
        - error
        - stdlib
        - anon
        - empty
    interfacebloat:
      max: 5
    iface:
      enable:
        - identical
        - unused
        - opaque
        - unexported
    depguard:
      rules:
        api_isolate:
          files:
            - "**/api/**"
          deny:
            - pkg: "github.com/loks0n/synthetics-operator/internal"
              desc: "api types must not import internal packages"
            - pkg: "github.com/loks0n/synthetics-operator/controllers"
              desc: "api types must not import controllers"
        metrics_isolate:
          files:
            - "**/internal/metrics/**"
          deny:
            - pkg: "github.com/loks0n/synthetics-operator/internal/probes"
              desc: "metrics must not depend on higher layers"
            - pkg: "github.com/loks0n/synthetics-operator/controllers"
              desc: "metrics must not depend on controllers"
        webhookcerts_isolate:
          files:
            - "**/internal/webhookcerts/**"
          deny:
            - pkg: "github.com/loks0n/synthetics-operator/internal/probes"
              desc: "webhookcerts must not depend on probes"
            - pkg: "github.com/loks0n/synthetics-operator/internal/metrics"
              desc: "webhookcerts must not depend on metrics"
            - pkg: "github.com/loks0n/synthetics-operator/controllers"
              desc: "webhookcerts must not depend on controllers"
        probes_no_controllers:
          files:
            - "**/internal/probes/**"
          deny:
            - pkg: "github.com/loks0n/synthetics-operator/controllers"
              desc: "probes must not depend on controllers"
        no_vague_packages:
          files:
            - "$all"
          deny:
            - pkg: ".*/util$"
              desc: "Name the domain concept, not the utility."
            - pkg: ".*/utils$"
              desc: "Name the domain concept, not the utility."
            - pkg: ".*/helpers?$"
              desc: "Name the domain concept, not the helper."
            - pkg: ".*/common$"
              desc: "Move to a domain-specific package."
            - pkg: ".*/misc$"
              desc: "Move to a domain-specific package."
    forbidigo:
      forbid:
        - pattern: '^.*[Hh]elpers?\.(New|Get|Make|Do|Run|Process|Handle).*$'
          msg: "Call the domain operation directly, not via a generic helper."
    dupl:
      threshold: 100
    nestif:
      min-complexity: 4
    maintidx:
      under: 20
    gomodguard:
      blocked:
        modules:
          - github.com/pkg/errors:
              reason: Use stdlib errors.Join and fmt.Errorf with %w.
    revive:
      rules:
        # Naming & style
        - name: blank-imports
        - name: comment-spacings
        - name: confusing-naming
        - name: enforce-repeated-arg-type-style
          arguments:
            - "short"
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
        - name: get-return
        - name: import-alias-naming
        - name: increment-decrement
        - name: package-naming
        - name: package-directory-mismatch
        - name: receiver-naming
        - name: redundant-import-alias
        - name: time-naming
        - name: use-any
        - name: var-declaration
        - name: var-naming
        # Logic & control flow
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: early-return
        - name: errorf
        - name: identical-branches
        - name: identical-ifelseif-branches
        - name: identical-ifelseif-conditions
        - name: identical-switch-branches
        - name: identical-switch-conditions
        - name: if-return
        - name: indent-error-flow
        - name: superfluous-else
        - name: unnecessary-if
        - name: unreachable-code
        # Bug prevention
        - name: atomic
        - name: bare-return
        - name: call-to-gc
        - name: datarace
        - name: defer
        - name: modifies-value-receiver
        - name: redefines-builtin-id
        - name: string-of-int
        - name: time-equal
        - name: unconditional-recursion
        - name: unexported-return
        - name: waitgroup-by-value
        # Code quality
        - name: deep-exit
        - name: duplicated-imports
        - name: empty-block
        - name: empty-lines
        - name: import-shadowing
        - name: inefficient-map-lookup
        - name: range
        - name: struct-tag
          arguments:
            - "json,inline"
        - name: unnecessary-format
        - name: unnecessary-stmt
        - name: useless-break
        - name: useless-fallthrough
        # Modern Go (1.21+, 1.25+)
        - name: forbidden-call-in-wg-go
        - name: redundant-build-tag
        - name: use-fmt-print
        - name: use-slices-sort
        - name: use-waitgroup-go
  exclusions:
    rules:
      - linters:
          - dupl
        path: controllers/.*_controller\.go
      - linters:
          - dupl
        path: internal/webhookcerts/cert_manager\.go
      - linters:
          - gochecknoglobals
        path: api/v1alpha1/groupversion_info\.go
      - linters:
          - gochecknoglobals
          - ireturn
        path: _test\.go$
    paths:
      - "zz_generated\\..*\\.go"
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
