# Minimal K6Test: a small load script exercising a target endpoint every
# 10 minutes. Thresholds live inside the script; the operator only sees
# whether k6 exited successfully and surfaces that on synthetics_test.
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-load-script
data:
  script.js: |
    import http from 'k6/http';
    import { check } from 'k6';

    export const options = {
      vus: 5,
      duration: '30s',
      thresholds: {
        http_req_failed: ['rate<0.01'],   // <1% errors
        http_req_duration: ['p(95)<500'], // p95 < 500ms
      },
    };

    export default function () {
      const res = http.get('https://example.com');
      check(res, { 'status is 200': (r) => r.status === 200 });
    }
---
apiVersion: synthetics.dev/v1alpha1
kind: K6Test
metadata:
  name: api-load
spec:
  interval: 10m
  k6Version: "0.50.0"
  script:
    configMap:
      name: api-load-script
      key: script.js
  ttlAfterFinished: 1h
  runner:
    resources:
      requests:
        memory: 256Mi
        cpu: 500m
      limits:
        memory: 512Mi
        cpu: 1000m
  metricLabels:
    team: platform
    env: production
